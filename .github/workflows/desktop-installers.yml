name: Desktop Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS DMG
            os: macos-latest
            args: --mac dmg
            artifact-name: llb-macos
          - name: Windows NSIS
            os: windows-latest
            args: --win nsis
            artifact-name: llb-windows
          - name: GNU/Linux packages
            os: ubuntu-latest
            args: --linux AppImage deb rpm
            artifact-name: llb-linux

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - name: Install Linux package tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Build frontend
        shell: bash
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Install desktop dependencies
        shell: bash
        run: |
          cd desktop
          npm ci

      - name: Build native desktop backend
        shell: bash
        run: bash scripts/build_desktop_backend.sh

      - name: Build Electron installers
        shell: bash
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run dist -- ${{ matrix.args }} --publish never --config.mac.notarize=false

      - name: Stage installers
        shell: bash
        run: |
          mkdir -p release-artifacts
          find desktop/dist -maxdepth 1 -type f \
            \( -name "*.AppImage" -o -name "*.deb" -o -name "*.dmg" -o -name "*.exe" -o -name "*.msi" -o -name "*.pkg" -o -name "*.rpm" -o -name "*.tar.gz" -o -name "*.zip" \) \
            -exec cp {} release-artifacts/ \;

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: release-artifacts/*
          if-no-files-found: error
